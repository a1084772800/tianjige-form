<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Content-Language" content="zh-CN">
<title>天机阁 · 动态页面</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: #0a0a0a;
  color: #e8e0d0;
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%);
}
.loading h1 {
  font-size: 1.4rem;
  background: linear-gradient(to right, #f6d365, #fda085);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 16px;
}
.loading .spinner {
  width: 32px; height: 32px;
  border: 3px solid rgba(246,211,101,0.2);
  border-top-color: #f6d365;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.loading .status {
  color: #a09080;
  font-size: 0.85rem;
  margin-top: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error {
  text-align: center;
  padding: 60px 20px;
  color: #a09080;
}
.error h2 { color: #f6d365; margin-bottom: 12px; }
.error .retry-btn {
  display: inline-block;
  margin-top: 16px;
  padding: 10px 24px;
  border-radius: 8px;
  border: 1px solid #f6d365;
  color: #f6d365;
  background: transparent;
  cursor: pointer;
  font-size: 0.95rem;
}
.error .retry-btn:active { opacity: 0.7; }
#render-frame {
  width: 100%;
  height: 100vh;
  border: none;
  display: none;
}
</style>
</head>
<body>

<div class="loading" id="loading">
  <h1>天机阁</h1>
  <div class="spinner"></div>
  <div class="status" id="load-status">加载中...</div>
</div>

<div class="error" id="error" style="display:none">
  <h2 id="error-icon">⚠️</h2>
  <p id="error-msg"></p>
  <button class="retry-btn" onclick="loadPage()">重新加载</button>
</div>

<iframe id="render-frame" sandbox="allow-scripts allow-same-origin allow-popups allow-forms"></iframe>

<script>
const API = 'https://v609a76lof.sealoshzh.site';
const MAX_RETRIES = 3;
const RETRY_DELAYS = [1000, 2000, 4000];
const FETCH_TIMEOUT = 15000;

const params = new URLSearchParams(location.search);
const id = params.get('id');

function showLoading(msg) {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('error').style.display = 'none';
  document.getElementById('render-frame').style.display = 'none';
  document.getElementById('load-status').textContent = msg || '加载中...';
}

function showError(msg, icon) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error').style.display = 'block';
  document.getElementById('error-msg').textContent = msg;
  document.getElementById('error-icon').textContent = icon || '⚠️';
}

function fetchWithTimeout(url, ms) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), ms);
  return fetch(url, { signal: controller.signal }).finally(() => clearTimeout(timer));
}

async function loadPage(attempt) {
  attempt = attempt || 0;

  if (!id) {
    showError('缺少页面 ID', '❌');
    return;
  }

  if (attempt === 0) {
    showLoading('加载中...');
  } else {
    showLoading('第 ' + attempt + ' 次重试...');
  }

  try {
    const res = await fetchWithTimeout(
      API + '/get_render?id=' + encodeURIComponent(id),
      FETCH_TIMEOUT
    );
    const data = await res.json();

    if (data.error) {
      var msgs = {
        'not found': '页面不存在或已被删除',
        'expired': '页面已过期',
      };
      showError(msgs[data.error] || data.error, data.error === 'expired' ? '⏰' : '🔍');
      return;
    }

    if (data.title) {
      document.title = '天机阁 · ' + data.title;
    }

    // 确保 HTML 有中文语言标记
    var html = data.html || '';
    if (html.indexOf('<html') !== -1 && html.indexOf('lang=') === -1) {
      html = html.replace('<html', '<html lang="zh-CN"');
    }
    if (html.indexOf('charset') === -1 && html.indexOf('<head>') !== -1) {
      html = html.replace('<head>', '<head><meta charset="UTF-8">');
    }

    var frame = document.getElementById('render-frame');
    frame.srcdoc = html;
    frame.style.display = 'block';
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'none';

    // 自适应高度 + 内容变化监听
    frame.onload = function() {
      try {
        var h = frame.contentDocument.documentElement.scrollHeight;
        if (h > 100) frame.style.height = h + 'px';
        var observer = new MutationObserver(function() {
          var newH = frame.contentDocument.documentElement.scrollHeight;
          if (newH > 100) frame.style.height = newH + 'px';
        });
        observer.observe(frame.contentDocument.body, { childList: true, subtree: true, attributes: true });
      } catch(e) {}
    };

  } catch (e) {
    if (attempt < MAX_RETRIES) {
      var delay = RETRY_DELAYS[attempt] || 4000;
      showLoading('加载超时，' + (delay/1000) + '秒后重试 (' + (attempt+1) + '/' + MAX_RETRIES + ')...');
      await new Promise(function(r) { setTimeout(r, delay); });
      return loadPage(attempt + 1);
    }
    showError('加载失败，请检查网络后重试', '😵');
  }
}

loadPage();
</script>
</body>
</html>
