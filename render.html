<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>天机阁 · 动态页面</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: #0a0a0a;
  color: #e8e0d0;
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
/* 加载状态 */
.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%);
}
.loading h1 {
  font-size: 1.4rem;
  background: linear-gradient(to right, #f6d365, #fda085);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 16px;
}
.loading .spinner {
  width: 32px; height: 32px;
  border: 3px solid rgba(246,211,101,0.2);
  border-top-color: #f6d365;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error {
  text-align: center;
  padding: 60px 20px;
  color: #a09080;
}
.error h2 { color: #f6d365; margin-bottom: 12px; }
/* 渲染区域全屏 */
#render-frame {
  width: 100%;
  height: 100vh;
  border: none;
  display: none;
}
</style>
</head>
<body>

<div class="loading" id="loading">
  <h1>天机阁</h1>
  <div class="spinner"></div>
</div>

<div class="error" id="error" style="display:none">
  <h2>⚠️</h2>
  <p id="error-msg"></p>
</div>

<iframe id="render-frame" sandbox="allow-scripts allow-same-origin allow-popups allow-forms"></iframe>

<script>
(async () => {
  const API = 'https://v609a76lof.sealoshzh.site';
  const params = new URLSearchParams(location.search);
  const id = params.get('id');

  if (!id) {
    showError('缺少页面 ID');
    return;
  }

  try {
    const res = await fetch(`${API}/get_render?id=${encodeURIComponent(id)}`);
    const data = await res.json();

    if (data.error) {
      const msgs = {
        'not found': '页面不存在',
        'expired': '页面已过期',
      };
      showError(msgs[data.error] || data.error);
      return;
    }

    // 更新标题
    if (data.title) {
      document.title = `天机阁 · ${data.title}`;
    }

    // 渲染到 iframe
    const frame = document.getElementById('render-frame');
    frame.srcdoc = data.html;
    frame.style.display = 'block';
    document.getElementById('loading').style.display = 'none';

    // 自适应高度
    frame.onload = () => {
      try {
        const h = frame.contentDocument.documentElement.scrollHeight;
        if (h > 0) frame.style.height = h + 'px';
      } catch(e) {}
    };
  } catch (e) {
    showError('加载失败，请稍后重试');
  }

  function showError(msg) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error-msg').textContent = msg;
  }
})();
</script>
</body>
</html>
